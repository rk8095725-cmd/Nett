<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie-Plex | Trending</title>
    <style>
        body {
            background-color: #111;
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
        }

        .navbar {
            padding: 15px 30px;
            background: rgba(0,0,0,0.9);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
        }

        .logo {
            color: #e50914;
            font-size: 24px;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .container {
            padding: 80px 20px 20px 20px;
        }

        h2 {
            margin-left: 10px;
            font-size: 20px;
        }

        /* Movie Grid Layout */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 15px;
            padding: 10px;
        }

        .movie-card {
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .movie-card img {
            width: 100%;
            height: 230px;
            border-radius: 8px;
            object-fit: cover; /* Poster ko sahi shape mein rakhta hai */
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
        }

        .movie-card:hover {
            transform: scale(1.1);
        }

        .movie-title {
            text-align: center;
            font-size: 13px;
            margin-top: 8px;
            color: #ccc;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MOVIE-PLEX</div>
    </div>

    <div class="container">
        <h2>Trending Movies & Shows</h2>
        
        <div class="movie-grid">
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/8Gxv2mYqlLzwqL7fkMv2p2YIttX.jpg" alt="Movie">
                <div class="movie-title">Dhurandhar</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/49WfT189EuGbZ0R67vQub9S1Y1p.jpg" alt="Movie">
                <div class="movie-title">Stranger Things</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/reEMJA1uzpG3SZ0KGbnndreBff5.jpg" alt="Movie">
                <div class="movie-title">Money Heist</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/7WsyChvnavvjxAR1hgRzuvj2sH4.jpg" alt="Movie">
                <div class="movie-title">The Batman</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/xXp9uYpZ0JpAg996Y96Oex9Y89v.jpg" alt="Movie">
                <div class="movie-title">Wednesday</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/v9p9pXjO86rV5G6l8v4j9O8v8v8.jpg" alt="Movie">
                <div class="movie-title">Pushpa 2</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/fTux9id99Ip69M99S9999.jpg" alt="Movie" onerror="this.src='https://via.placeholder.com/200x300?text=Animal'">
                <div class="movie-title">Animal</div>
            </div>
            <div class="movie-card">
                <img src="https://image.tmdb.org/t/p/w500/39p9pXjO86rV5G6l8v4j9O8v8v8.jpg" alt="Movie" onerror="this.src='https://via.placeholder.com/200x300?text=Pathaan'">
                <div class="movie-title">Pathaan</div>
            </div>
        </div>
    </div>

</body>
</html>
