<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Movie App</title>
    <style>
        /* CSS Starts Here */
        body {
            background-color: #111; /* Dark Netflix Theme */
            color: white;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Top Navigation */
        .navbar {
            padding: 20px 50px;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7) 10%, rgba(0,0,0,0));
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 100;
        }

        .logo {
            color: #e50914;
            font-size: 30px;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Movie Gallery Layout */
        .container {
            padding: 100px 50px 50px 50px;
        }

        h2 {
            margin-bottom: 20px;
        }

        /* Grid for many movie posters */
        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        .movie-card {
            position: relative;
            transition: transform 0.3s ease;
            cursor: pointer;
        }

        .movie-card img {
            width: 100%;
            border-radius: 5px;
            object-fit: cover;
        }

        /* Hover Effect */
        .movie-card:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .movie-title {
            text-align: center;
            font-size: 14px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

    <div class="navbar">
        <div class="logo">MOVIE-PLEX</div>
    </div>

    <div class="container">
        <h2>Trending Now</h2>
        
        <div class="movie-grid">
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+1" alt="Poster">
                <div class="movie-title">Movie 1</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+2" alt="Poster">
                <div class="movie-title">Movie 2</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+3" alt="Poster">
                <div class="movie-title">Movie 3</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+4" alt="Poster">
                <div class="movie-title">Movie 4</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+5" alt="Poster">
                <div class="movie-title">Movie 5</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+6" alt="Poster">
                <div class="movie-title">Movie 6</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+7" alt="Poster">
                <div class="movie-title">Movie 7</div>
            </div>
            <div class="movie-card">
                <img src="https://via.placeholder.com/200x300?text=Movie+8" alt="Poster">
                <div class="movie-title">Movie 8</div>
            </div>
            </div>
    </div>

</body>
    </html>
